name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write
  id-token: write   # needed for keyless Cosign signing (optional but ready)

env:
  REGISTRY_GHCR: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # e.g. mikechambers/vpn-rebind

jobs:
  build-and-push:
    name: Build and push multi-arch image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Test ─────────────────────────────────────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test -race ./...

      # ── Docker metadata ──────────────────────────────────────────────────
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
          tags: |
            # Full semver tag: v1.2.3
            type=semver,pattern={{version}}
            # Major.minor: v1.2
            type=semver,pattern={{major}}.{{minor}}
            # Major only: v1
            type=semver,pattern={{major}}
            # latest on every release tag
            type=raw,value=latest,enable=true
          labels: |
            org.opencontainers.image.title=vpn-rebind
            org.opencontainers.image.description=Event-driven Docker controller that rebinds VPN namespace dependents when the provider restarts

      # ── QEMU + Buildx for multi-arch ─────────────────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Authenticate ─────────────────────────────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build & push ─────────────────────────────────────────────────────
      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}

      # ── Provenance summary ───────────────────────────────────────────────
      - name: Image digest
        run: echo "Pushed ${{ steps.build.outputs.digest }}"

  # ── Optional: create a GitHub Release with auto-generated changelog ──────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
